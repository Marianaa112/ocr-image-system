<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#ccc;display:flex;justify-content:center;padding:40px;}
.ticket{background:#fff;width:300px;font-family:'Courier New',monospace;font-size:13px;padding:20px 16px;line-height:1.6;}
.center{text-align:center;}
.bold{font-weight:bold;}
hr{border-top:1px dashed #000;margin:8px 0;}
.row{display:flex;justify-content:space-between;}
.total-row{display:flex;justify-content:space-between;font-weight:bold;}
</style>
</head>
<body>
<div class="ticket">
  <div class="center bold">PRIMERA PLUS</div>
  <div class="center">AUTOBUSES DE MÉXICO SA</div>
  <div class="center">RFC: APM930101AA1</div>
  <hr>
  <div class="center">TERMINAL TOLUCA</div>
  <hr>
  <div class="row"><span>FECHA:</span><span>28/05/2026</span></div>
  <div class="row"><span>HORA:</span><span>07:00</span></div>
  <div class="row"><span>RUTA:</span><span>TOLUCA-CDMX</span></div>
  <div class="row"><span>ASIENTO:</span><span>18</span></div>
  <hr>
  <div class="row"><span>BOLETO</span><span>$210.00</span></div>
  <hr>
  <div class="total-row"><span>TOTAL:</span><span>$210.00</span></div>
  <div class="row"><span>FORMA PAGO:</span><span>EFECTIVO</span></div>
</div>
</body>
</html>
