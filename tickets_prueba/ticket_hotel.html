<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#ccc;display:flex;justify-content:center;padding:40px;}
.ticket{background:#fff;width:300px;font-family:'Courier New',monospace;font-size:13px;padding:20px 16px;line-height:1.6;}
.center{text-align:center;}
.bold{font-weight:bold;}
hr{border-top:1px dashed #000;margin:8px 0;}
.row{display:flex;justify-content:space-between;}
.total-row{display:flex;justify-content:space-between;font-weight:bold;}
</style>
</head>
<body>
<div class="ticket">
  <div class="center bold">MARRIOTT HOTEL</div>
  <div class="center">MARRIOTT INTERNATIONAL INC</div>
  <div class="center">RFC: MHR8801239X1</div>
  <hr>
  <div class="center">AV. SANTÍN 1200, TOLUCA</div>
  <div class="center">COL. RESIDENCIAL</div>
  <hr>
  <div class="row"><span>HABITACIÓN:</span><span>508</span></div>
  <div class="row"><span>NOCHES:</span><span>3</span></div>
  <div class="row"><span>FECHA:</span><span>28/05/2026</span></div>
  <hr>
  <div class="row"><span>HOSPEDAJE</span><span>$4,500.00</span></div>
  <div class="row"><span>IMPUESTOS</span><span>$720.00</span></div>
  <hr>
  <div class="total-row"><span>TOTAL:</span><span>$5,220.00</span></div>
  <div class="row"><span>FORMA PAGO:</span><span>TRANSFERENCIA</span></div>
</div>
</body>
</html>
